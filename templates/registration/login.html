{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – ModelDev</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="{% static 'css/app.css' %}" />
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-dark">
  <div class="card shadow-lg" style="width:380px">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <i class="bi bi-boxes display-4 text-primary"></i>
        <h2 class="mt-2 fw-bold">ModelDev</h2>
        <p class="text-muted small">Django Model Builder</p>
      </div>
      <form method="post">
        {% csrf_token %}
        {% if form.errors %}
          <div class="alert alert-danger py-2">Invalid username or password.</div>
        {% endif %}
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" autofocus required />
        </div>
        <div class="mb-4">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
        <input type="hidden" name="next" value="{{ next }}" />
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
