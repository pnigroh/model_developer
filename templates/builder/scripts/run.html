{% extends "base.html" %}
{% block title %}Running Script – ModelDev{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-3 mb-4">
  <a href="{% url 'scripts_index' %}" class="btn btn-sm btn-outline-secondary" id="back-btn">
    <i class="bi bi-arrow-left"></i>
  </a>
  <div>
    <h1 class="h3 mb-0 fw-bold"><i class="bi bi-terminal text-warning"></i> Script Output</h1>
    <p class="text-muted mb-0 small font-monospace" style="word-break:break-all">{{ label }}</p>
  </div>
  <!-- Status badge -->
  <div class="ms-auto">
    <span id="status-badge" class="badge bg-warning text-dark fs-6 px-3 py-2">
      <span class="spinner-border spinner-border-sm me-1"></span> Running…
    </span>
  </div>
</div>

<!-- Terminal window -->
<div class="card">
  <div class="card-header d-flex align-items-center justify-content-between py-2">
    <div class="d-flex align-items-center gap-2">
      <span class="rounded-circle bg-danger" style="width:12px;height:12px;display:inline-block"></span>
      <span class="rounded-circle bg-warning" style="width:12px;height:12px;display:inline-block"></span>
      <span class="rounded-circle bg-success" style="width:12px;height:12px;display:inline-block"></span>
      <span class="text-muted small ms-2 font-monospace">terminal</span>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-sm btn-outline-secondary py-0" onclick="copyOutput()" id="copy-btn">
        <i class="bi bi-clipboard"></i> Copy
      </button>
      <button class="btn btn-sm btn-outline-secondary py-0" onclick="scrollToBottom()">
        <i class="bi bi-arrow-down-circle"></i> Bottom
      </button>
    </div>
  </div>
  <div class="card-body p-0">
    <div id="output"
         style="background:#0d1117;font-family:'JetBrains Mono','Fira Code',monospace;
                font-size:.82rem;line-height:1.6;min-height:480px;max-height:70vh;
                overflow-y:auto;padding:1.25rem;white-space:pre-wrap;word-break:break-all">
      <span class="text-muted">Connecting…</span>
    </div>
  </div>
</div>

<!-- Post-run actions (hidden until done) -->
<div id="done-actions" class="mt-4" style="display:none">
  <div class="card" id="done-card">
    <div class="card-body d-flex align-items-center justify-content-between flex-wrap gap-3">
      <div>
        <h5 class="mb-1 fw-bold" id="done-title">Script finished</h5>
        <p class="text-muted small mb-0" id="done-detail"></p>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <a href="{% url 'scripts_index' %}" class="btn btn-outline-secondary">
          <i class="bi bi-arrow-left"></i> Back to Scripts
        </a>
        <a href="{% url 'import_step1' %}" class="btn btn-outline-success" id="import-btn" style="display:none">
          <i class="bi bi-upload"></i> Import generated models into ModelDev
        </a>
        <button class="btn btn-outline-warning" onclick="location.reload()">
          <i class="bi bi-arrow-repeat"></i> Run again
        </button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const streamUrl  = "{% url 'scripts_stream' job_id=job_id %}";
const outputEl   = document.getElementById('output');
let   rawLines   = [];

// ── ANSI colour map ─────────────────────────────────────────────────────────
const ANSI = {
  '32': 'color:#4ade80',   // green  → ok
  '33': 'color:#fbbf24',   // yellow → warn
  '31': 'color:#f87171',   // red    → error
  '36': 'color:#67e8f9',   // cyan   → info
  '1':  'font-weight:bold',
  '0':  '',
};

function ansiToHtml(line) {
  // Replace \033[Xm … \033[0m with <span style="...">…</span>
  return line
    .replace(/\x1b\[([0-9;]*)m/g, function (_, codes) {
      if (!codes || codes === '0') return '</span>';
      const style = codes.split(';').map(c => ANSI[c] || '').filter(Boolean).join(';');
      return style ? `<span style="${style}">` : '';
    })
    // Colour prefix symbols without ANSI
    .replace(/^(✔ .+)$/, '<span style="color:#4ade80">$1</span>')
    .replace(/^(⚠ .+)$/, '<span style="color:#fbbf24">$1</span>')
    .replace(/^(✘ .+)$/, '<span style="color:#f87171">$1</span>')
    .replace(/^(→ .+)$/, '<span style="color:#67e8f9">$1</span>');
}

function appendLine(text) {
  rawLines.push(text);
  const el = outputEl;
  // Replace placeholder on first real line
  if (el.querySelector('.text-muted') && rawLines.length === 1) {
    el.innerHTML = '';
  }
  const div = document.createElement('div');
  div.innerHTML = ansiToHtml(escapeHtml(text));
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function scrollToBottom() {
  outputEl.scrollTop = outputEl.scrollHeight;
}

function copyOutput() {
  navigator.clipboard.writeText(rawLines.join('\n')).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.innerHTML = '<i class="bi bi-check-lg"></i> Copied!';
    setTimeout(() => { btn.innerHTML = '<i class="bi bi-clipboard"></i> Copy'; }, 2000);
  });
}

// ── SSE connection ──────────────────────────────────────────────────────────
const evtSource = new EventSource(streamUrl);

evtSource.onmessage = function (e) {
  appendLine(e.data);
};

evtSource.addEventListener('done', function (e) {
  evtSource.close();
  const rc = parseInt(e.data, 10);
  const badge   = document.getElementById('status-badge');
  const actDiv  = document.getElementById('done-actions');
  const card    = document.getElementById('done-card');
  const title   = document.getElementById('done-title');
  const detail  = document.getElementById('done-detail');

  actDiv.style.display = '';

  if (rc === 0) {
    badge.className = 'badge bg-success fs-6 px-3 py-2';
    badge.innerHTML = '<i class="bi bi-check-circle me-1"></i> Finished successfully';
    card.classList.add('border-success');
    title.textContent = 'Script completed successfully (exit 0)';
    title.className   = 'mb-1 fw-bold text-success';
    detail.textContent = 'All steps finished without errors.';
    // Show import hint if this was the generate script
    const label = "{{ label }}";
    if (label.includes('generate_django_models') || label.toLowerCase().includes('generate')) {
      document.getElementById('import-btn').style.display = '';
    }
  } else {
    badge.className = 'badge bg-danger fs-6 px-3 py-2';
    badge.innerHTML = `<i class="bi bi-x-circle me-1"></i> Failed (exit ${rc})`;
    card.classList.add('border-danger');
    title.textContent = `Script exited with error (code ${rc})`;
    title.className   = 'mb-1 fw-bold text-danger';
    detail.textContent = 'Check the output above for details.';
  }
});

evtSource.onerror = function () {
  evtSource.close();
  appendLine('[connection closed]');
  document.getElementById('status-badge').className = 'badge bg-secondary fs-6 px-3 py-2';
  document.getElementById('status-badge').textContent = 'Disconnected';
};
</script>
{% endblock %}
